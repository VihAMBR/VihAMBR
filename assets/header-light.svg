  <line x1="88" y1="250" x2="88" y2="250" stroke="#e2e2e2" stroke-width="1">
    <animate attributeName="x2" from="88" to="1192" dur="1s" begin="0.35s" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1" fill="freeze"/>
  </line>
  <g font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="3" fill="#6a6a6a">
    <text x="88" y="293">DESIGN ENGINEER
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.7s" fill="freeze"/>
