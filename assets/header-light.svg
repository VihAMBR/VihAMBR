<svg width="1280" height="340" viewBox="0 0 1280 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vihaan Agarwal — Design Engineer">
  <rect width="1280" height="340" fill="#fafafa"/>
  <g font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, monospace">
    <rect x="88" y="100" width="9" height="9" fill="#0a0a0a">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.1s" fill="freeze"/>
    </rect>
    <text x="112" y="110" font-size="13" letter-spacing="6" fill="#8a8a8a">
      PORTFOLIO / 2026
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.15s" fill="freeze"/>
    </text>
  </g>
  <text x="86" y="216" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="96" font-weight="700" letter-spacing="-3.5" fill="#0a0a0a">
    Vihaan Agarwal
    <animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.2s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 14" to="0 0" dur="0.7s" begin="0.2s" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1" fill="freeze"/>
